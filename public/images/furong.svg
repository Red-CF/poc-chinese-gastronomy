<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="furongGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e8b57"/>
      <stop offset="50%" style="stop-color:#1e5f3a"/>
      <stop offset="100%" style="stop-color:#0d3d24"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#furongGrad)"/>

  <!-- Waterfall -->
  <rect x="150" y="50" width="100" height="200" fill="#87ceeb" opacity="0.7"/>
  <rect x="160" y="50" width="20" height="200" fill="#ffffff" opacity="0.5"/>
  <rect x="200" y="50" width="15" height="200" fill="#ffffff" opacity="0.4"/>
  <rect x="230" y="50" width="10" height="200" fill="#ffffff" opacity="0.3"/>

  <!-- Cliff behind waterfall -->
  <rect x="140" y="50" width="10" height="200" fill="#4a2800"/>
  <rect x="250" y="50" width="10" height="200" fill="#4a2800"/>

  <!-- Traditional buildings on sides -->
  <rect x="20" y="100" width="100" height="100" fill="#8b4513"/>
  <polygon points="20,100 70,60 120,100" fill="#8b0000"/>
  <rect x="40" y="120" width="20" height="20" fill="#ffd700" opacity="0.7"/>
  <rect x="80" y="120" width="20" height="20" fill="#ffd700" opacity="0.7"/>
  <rect x="40" y="160" width="20" height="20" fill="#ffd700" opacity="0.5"/>
  <rect x="80" y="160" width="20" height="20" fill="#ffd700" opacity="0.5"/>

  <rect x="280" y="120" width="90" height="80" fill="#654321"/>
  <polygon points="280,120 325,85 370,120" fill="#a0522d"/>
  <rect x="300" y="140" width="15" height="15" fill="#ffd700" opacity="0.6"/>
  <rect x="335" y="140" width="15" height="15" fill="#ffd700" opacity="0.6"/>

  <!-- Stone bridge -->
  <rect x="50" y="220" width="80" height="10" fill="#696969"/>
  <rect x="70" y="210" width="10" height="10" fill="#696969"/>
  <rect x="100" y="210" width="10" height="10" fill="#696969"/>

  <!-- Mist at bottom -->
  <ellipse cx="200" cy="260" rx="80" ry="15" fill="#ffffff" opacity="0.3"/>

  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold">芙蓉镇</text>
  <text x="200" y="295" text-anchor="middle" fill="#ffd700" font-size="12">Furong</text>
</svg>
