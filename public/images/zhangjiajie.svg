<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="zhangjiajieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4500"/>
      <stop offset="50%" style="stop-color:#2e8b57"/>
      <stop offset="100%" style="stop-color:#006400"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#zhangjiajieGrad)"/>

  <!-- Sky -->
  <rect x="0" y="0" width="400" height="100" fill="#87ceeb" opacity="0.3"/>

  <!-- Avatar pillars -->
  <polygon points="50,250 70,80 90,80 110,250" fill="#2e8b57"/>
  <polygon points="140,250 165,50 185,50 210,250" fill="#3cb371"/>
  <polygon points="240,250 260,100 280,100 300,250" fill="#2e8b57"/>
  <polygon points="320,250 340,120 360,120 380,250" fill="#3cb371"/>

  <!-- Mist -->
  <ellipse cx="100" cy="200" rx="60" ry="20" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="200" cy="180" rx="80" ry="25" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="320" cy="190" rx="70" ry="20" fill="#ffffff" opacity="0.4"/>

  <!-- Pine trees on pillars -->
  <polygon points="70,80 60,95 80,95" fill="#006400"/>
  <polygon points="175,50 160,70 190,70" fill="#006400"/>
  <polygon points="270,100 260,115 280,115" fill="#006400"/>

  <!-- Glass bridge -->
  <rect x="110" y="130" width="130" height="8" fill="#87ceeb" opacity="0.6"/>
  <line x1="110" y1="130" x2="110" y2="138" stroke="#4682b4" stroke-width="2"/>
  <line x1="240" y1="130" x2="240" y2="138" stroke="#4682b4" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="280" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold">张家界</text>
  <text x="200" y="295" text-anchor="middle" fill="#ffd700" font-size="12">Zhangjiajie</text>
</svg>
