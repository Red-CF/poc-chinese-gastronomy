<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="beijingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000"/>
      <stop offset="50%" style="stop-color:#b8860b"/>
      <stop offset="100%" style="stop-color:#cd853f"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#beijingGrad)"/>

  <!-- Great Wall -->
  <path d="M0,200 Q50,180 100,200 T200,200 T300,200 T400,200 L400,220 L0,220 Z" fill="#8b4513"/>
  <rect x="50" y="185" width="30" height="20" fill="#a0522d"/>
  <rect x="150" y="190" width="30" height="18" fill="#a0522d"/>
  <rect x="250" y="185" width="30" height="20" fill="#a0522d"/>
  <rect x="350" y="190" width="30" height="18" fill="#a0522d"/>

  <!-- Forbidden City -->
  <rect x="120" y="120" width="160" height="80" fill="#8b0000"/>
  <rect x="140" y="100" width="20" height="20" fill="#ffd700"/>
  <rect x="180" y="90" width="40" height="30" fill="#ffd700"/>
  <rect x="240" y="100" width="20" height="20" fill="#ffd700"/>

  <!-- Temple of Heaven -->
  <polygon points="200,40 170,90 230,90" fill="#1e3a5f"/>
  <polygon points="200,50 180,85 220,85" fill="#1e3a5f"/>
  <rect x="195" y="85" width="10" height="15" fill="#8b0000"/>

  <!-- Mountains -->
  <polygon points="0,200 80,100 160,200" fill="#6b4423"/>
  <polygon points="240,200 320,80 400,200" fill="#5d3a1a"/>

  <!-- Title -->
  <text x="200" y="260" text-anchor="middle" fill="#ffd700" font-size="24" font-weight="bold">北京</text>
  <text x="200" y="275" text-anchor="middle" fill="#ffffff" font-size="12">Beijing</text>
</svg>
